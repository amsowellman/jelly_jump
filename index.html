<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jelly Jump - A Phaser Platformer</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/vendor/phaser.min.js"></script>
</head>
<body>
    <div id="game-container">
        <div id="game-wrapper">
            <div id="game-title-bar">
                <h1>Jelly Jump</h1>
            </div>
            <div id="phaser-game"></div>
            <div id="controls-hint">
                <span class="key">A</span> / <span class="key">&larr;</span> Move Left &nbsp;|&nbsp;
                <span class="key">D</span> / <span class="key">&rarr;</span> Move Right &nbsp;|&nbsp;
                <span class="key">W</span> / <span class="key">&uarr;</span> / <span class="key">Space</span> Jump &nbsp;|&nbsp;
                <span class="key">P</span> Pause &nbsp;|&nbsp;
                <span class="key">M</span> Music On/Off
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/sfx.js"></script>
    <script src="js/scene_boot.js"></script>
    <script src="js/scene_menu.js"></script>
    <script src="js/scene_charselect.js"></script>
    <script src="js/scene_play.js"></script>
    <script src="js/scene_gameover.js"></script>
    <script src="js/scene_victory.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
